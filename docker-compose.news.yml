services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    entrypoint:
      - /bin/sh
      - -c
    command:
      - rpk topic create atlas.market.news -X brokers=redpanda:29092 --partitions 1 --replicas 1 || true
    depends_on:
      redpanda:
        condition: service_healthy

  news-streamer:
    profiles:
      - docker-news
    build:
      context: ./backend
      dockerfile: Dockerfile.news
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_TOPIC: atlas.market.news
      NEWS_STREAM_MODE: ${NEWS_STREAM_MODE:-forever}
      STREAM_INTERVAL_SECONDS: ${STREAM_INTERVAL_SECONDS:-86400}
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped

  warning-streamer:
    build:
      context: ./backend
      dockerfile: Dockerfile.warning_streamer
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_TOPIC: atlas.market.news
      WARNING_STREAM_GROUP_ID: atlas-warning-streamer
      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: atlas
      MONGO_WARNINGS_COLLECTION: market_warnings
      # Pass through whichever AI provider is exported by the local shell.
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      mongo:
        condition: service_started
    restart: unless-stopped

volumes:
  mongo-data:
